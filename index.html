<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZippyPay — World Cup Lottery · versions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}</style>
</head>
<body class="min-h-screen bg-[#0E1730] text-white flex items-center justify-center p-8">
  <div class="max-w-[560px] w-full">

    <!-- language switch -->
    <div class="flex justify-end">
      <div class="flex gap-1 p-1 rounded-full bg-white/5 border border-white/10 text-[13px] font-bold">
        <button data-lang="en" class="lang-btn px-3.5 py-1.5 rounded-full transition-colors">EN</button>
        <button data-lang="es" class="lang-btn px-3.5 py-1.5 rounded-full transition-colors">ES</button>
      </div>
    </div>

    <h1 class="mt-5 text-[28px] font-bold tracking-tight">ZippyPay — World Cup Lottery</h1>
    <p id="subtitle" class="mt-2 text-[15px] text-white/60"></p>

    <div class="mt-8 grid gap-4">
      <a href="v1-email.html" class="block rounded-2xl border border-white/10 bg-white/[.04] p-5 hover:bg-white/[.08] transition-colors">
        <div id="c1t" class="text-[17px] font-semibold"></div>
        <div id="c1d" class="mt-1 text-[14px] text-white/55"></div>
      </a>
      <a href="v2-mail.html" class="block rounded-2xl border border-white/10 bg-white/[.04] p-5 hover:bg-white/[.08] transition-colors">
        <div id="c2t" class="text-[17px] font-semibold"></div>
        <div id="c2d" class="mt-1 text-[14px] text-white/55"></div>
      </a>
    </div>
  </div>

  <script>
    var T = {
      en: {
        subtitle: "Two versions of the same email.",
        c1t: "① Email — pixel-perfect from Figma",
        c1d: "Clean email markup (600px), exactly like the design.",
        c2t: "② Opened in mail",
        c2d: "The same email inside a mail client (Apple Mail)."
      },
      es: {
        subtitle: "Dos versiones del mismo email.",
        c1t: "① Email — idéntico a Figma",
        c1d: "Maquetación limpia del email (600px), tal como el diseño.",
        c2t: "② Abierto en el correo",
        c2d: "El mismo email dentro de un cliente de correo (Apple Mail)."
      }
    };
    var btns = document.querySelectorAll('.lang-btn');
    function setLang(lang) {
      var t = T[lang] || T.en;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('c1t').textContent = t.c1t;
      document.getElementById('c1d').textContent = t.c1d;
      document.getElementById('c2t').textContent = t.c2t;
      document.getElementById('c2d').textContent = t.c2d;
      document.documentElement.lang = lang;
      btns.forEach(function (b) {
        var on = b.getAttribute('data-lang') === lang;
        b.classList.toggle('bg-white', on);
        b.classList.toggle('text-[#0E1730]', on);
        b.classList.toggle('text-white/60', !on);
      });
      try { localStorage.setItem('zp-lang', lang); } catch (e) {}
    }
    btns.forEach(function (b) {
      b.addEventListener('click', function () { setLang(b.getAttribute('data-lang')); });
    });
    var saved = 'en';
    try { saved = localStorage.getItem('zp-lang') || 'en'; } catch (e) {}
    setLang(saved);
  </script>
</body>
</html>
